# Prometheus 告警规则 — AI Fullstack Platform
groups:
  - name: backend
    interval: 30s
    rules:
      # 后端服务宕机
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "后端服务已宕机"
          description: "后端 API 服务在 {{ $labels.instance }} 上超过 1 分钟不可达"

      # HTTP 5xx 错误率过高
      - alert: BackendHigh5xx
        expr: |
          rate(http_requests_total{status=~"5.."}[5m]) 
          / rate(http_requests_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "HTTP 5xx 错误率超过 10%"
          description: "最近 5 分钟 5xx 错误率为 {{ $value | humanizePercentage }}"

      # 请求延迟过高
      - alert: BackendHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "HTTP P95 延迟超过 2 秒"
          description: "端点 {{ $labels.path }} 的 P95 延迟为 {{ $value }}s"

  - name: containers
    interval: 30s
    rules:
      # 容器不健康
      - alert: ContainerUnhealthy
        expr: container_health_status == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "容器 {{ $labels.container }} 不健康"
          description: "Docker 容器 {{ $labels.container }} 已超过 2 分钟处于不健康状态"

      # vllm 启动超时
      - alert: VllmStartupTimeout
        expr: container_health_status{container="vllm"} == 0
        for: 5m
        labels:
          severity: warning
          service: vllm
        annotations:
          summary: "vLLM 启动超时"
          description: "vLLM 容器启动超过 5 分钟仍未健康，可能模型加载失败"

  - name: models
    interval: 30s
    rules:
      # 模型调用错误率过高
      - alert: ModelCallErrorRate
        expr: |
          rate(model_call_errors_total[5m]) 
          / rate(model_calls_total[5m]) > 0.2
        for: 5m
        labels:
          severity: warning
          service: models
        annotations:
          summary: "模型调用错误率超过 20%"
          description: "Provider {{ $labels.provider }} 模型 {{ $labels.model_name }} 错误率为 {{ $value | humanizePercentage }}"

  - name: system
    interval: 30s
    rules:
      # 内存使用过高
      - alert: HighMemoryUsage
        expr: memory_usage_bytes / 1024 / 1024 / 1024 > 16
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "内存使用超过 16GB"
          description: "进程内存使用 {{ $value | humanize }}B，排查内存泄漏"
