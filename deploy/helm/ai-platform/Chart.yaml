apiVersion: v2
name: ai-platform
description: AI Fullstack Platform — Helm chart for Kubernetes deployment
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - ai
  - agent
  - llm
  - fastapi
  - vue

maintainers:
  - name: AI Platform Team
    email: team@example.com

dependencies:
  - name: postgresql
    version: "15.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "18.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
