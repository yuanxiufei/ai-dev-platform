apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-platform.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret-key: {{ .Values.secrets.secretKey | default (randAlphaNum 32) | quote }}
  postgres-password: {{ .Values.postgresql.auth.password | default (randAlphaNum 16) | quote }}
  first-superuser: {{ .Values.secrets.superuserEmail | default "admin@example.com" | quote }}
  first-superuser-password: {{ .Values.secrets.superuserPassword | default (randAlphaNum 16) | quote }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | default "" | quote }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | default "" | quote }}
