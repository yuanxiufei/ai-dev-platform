---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-platform.fullname" . }}-storage
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-platform.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: nfs-client
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-platform.fullname" . }}-models
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-platform.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: nfs-client
