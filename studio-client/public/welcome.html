<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome - CodeBuddy IDE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f131d;
      color: #dfe2f1;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden; user-select: none;
    }
    .bg-grid {
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      position: fixed; inset: 0; pointer-events: none;
    }

    .welcome {
      text-align: center;
      max-width: 480px;
      padding: 48px 32px;
      position: relative;
      z-index: 1;
    }
    .logo { margin-bottom: 28px; }
    .logo-svg { width: 72px; height: 72px; filter: drop-shadow(0 4px 20px rgba(192,193,255,0.25)); }

    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #fff 30%, #c0c1ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 14px;
      color: #908fa0;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .actions button {
      all: unset;
      padding: 13px 24px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.15s ease;
      font-weight: 500;
    }
    .btn-primary {
      background: linear-gradient(135deg, #8b7bd6, #6366f1);
      color: #fff;
      box-shadow: 0 2px 12px rgba(99,102,241,0.25);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.35); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: #dfe2f1;
      border: 1px solid rgba(70,69,84,0.5);
    }
    .btn-secondary:hover {
      background: rgba(192,193,255,0.06);
      border-color: rgba(192,193,255,0.2);
      color: #fff;
    }

    .shortcuts {
      margin-top: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 28px;
      text-align: left;
    }
    .shortcut {
      display: flex; justify-content: space-between; font-size: 12px;
    }
    .shortcut .key {
      color: #c0c1ff;
      font-family: 'Cascadia Code', 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .shortcut .desc { color: #585b70; }

    .version {
      margin-top: 32px;
      font-size: 11px;
      color: #45455a;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(28,31,42,0.9);
      backdrop-filter: blur(12px);
      color: #dfe2f1;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      border: 1px solid rgba(70,69,84,0.5);
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="welcome">
    <div class="logo">
      <svg class="logo-svg" viewBox="0 0 72 72" fill="none">
        <defs>
          <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8b7bd6"/>
            <stop offset="100%" stop-color="#6366f1"/>
          </linearGradient>
        </defs>
        <rect width="72" height="72" rx="18" fill="url(#logoGrad)"/>
        <rect x="18" y="22" width="12" height="28" rx="6" fill="#fff"/>
        <rect x="42" y="22" width="12" height="28" rx="6" fill="#fff" opacity="0.85"/>
      </svg>
    </div>
    <h1>CodeBuddy IDE</h1>
    <p class="subtitle">
      AI-Powered Fullstack Development Environment.<br/>
      Start with a new project or open an existing one.
    </p>

    <div class="actions">
      <button class="btn-primary" id="btnNewProject">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        New Project
      </button>
      <button class="btn-secondary" id="btnOpenFolder">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 2h4l2 2h5v9H3V2z" stroke="currentColor" stroke-width="1.5"/></svg>
        Open Folder
      </button>
      <button class="btn-secondary" id="btnCloneGit">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 3v10h10" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="1" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
        Clone Git Repository
      </button>
    </div>

    <div class="shortcuts">
      <div class="shortcut"><span class="key">Ctrl+K</span><span class="desc">Quick Open</span></div>
      <div class="shortcut"><span class="key">Ctrl+Shift+P</span><span class="desc">Command Palette</span></div>
      <div class="shortcut"><span class="key">Ctrl+K Ctrl+I</span><span class="desc">AI Inline Chat</span></div>
      <div class="shortcut"><span class="key">Ctrl+L</span><span class="desc">AI Panel</span></div>
    </div>

    <div class="version">CodeBuddy IDE v0.1.0</div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Tauri v2 API -->
  <script type="module">
    import { getCurrentWindow } from 'https://unpkg.com/@tauri-apps/api@2/window';

    const appWindow = getCurrentWindow();
    const toast = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    async function openMain() {
      try {
        // Try to close this welcome window and focus the main window
        await appWindow.close();
      } catch (e) {
        // Fallback: if close fails, just minimize/hide
        try {
          await appWindow.hide();
        } catch (e2) {
          // Last resort: navigate to main app
          console.warn('[Welcome] Could not manage window:', e2);
          window.location.href = '/chat';
        }
      }
    }

    document.getElementById('btnNewProject').addEventListener('click', async () => {
      try {
        // In Tauri v2, use the dialog plugin to pick directory / create project
        const { open } = await import('https://unpkg.com/@tauri-apps/plugin-dialog@2');
        const selected = await open({ directory: true, multiple: false });
        if (selected) {
          showToast('Opening workspace: ' + selected);
          setTimeout(() => openMain(), 600);
        }
      } catch (e) {
        // Dialog not available or cancelled — still enter main app
        showToast('Entering IDE...');
        setTimeout(() => openMain(), 400);
      }
    });

    document.getElementById('btnOpenFolder').addEventListener('click', async () => {
      try {
        const { open } = await import('https://unpkg.com/@tauri-apps/plugin-dialog@2');
        const selected = await open({ directory: true, multiple: false });
        if (selected) {
          showToast('Opening: ' + selected);
          setTimeout(() => openMain(), 600);
        } else {
          showToast('Cancelled');
        }
      } catch (e) {
        showToast('Opening IDE...');
        setTimeout(() => openMain(), 400);
      }
    });

    document.getElementById('btnCloneGit').addEventListener('click', () => {
      showToast('Clone Git — coming soon!');
      setTimeout(() => openMain(), 800);
    });
  </script>

  <!-- Fallback: non-module script for when Tauri API is unavailable -->
  <script>
    function fallbackHandler(id) {
      var btn = document.getElementById(id);
      if (!btn.dataset.bound) {
        btn.addEventListener('click', function() {
          // When not in Tauri context, just go to the main SPA
          window.location.href = '/chat';
        });
        btn.dataset.bound = 'true';
      }
    }
    fallbackHandler('btnNewProject');
    fallbackHandler('btnOpenFolder');
    fallbackHandler('btnCloneGit');

    // Double-click anywhere to enter
    document.body.addEventListener('dblclick', function() {
      window.location.href = '/chat';
    });
  </script>
</body>
</html>
